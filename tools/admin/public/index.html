<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Library · Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Pattern Library <span class="badge-dev">admin</span></h1>
        <p class="hint">Local-only tool for adding &amp; tagging images. Not part of the deployed site.</p>

        <div id="group-list" class="group-list"></div>

        <button id="new-group-btn" class="btn btn-secondary" type="button">+ New group</button>

        <form id="new-group-form" class="new-group-form" hidden>
          <input name="title" placeholder="Title (e.g. NYT Games)" required />
          <select name="category" required>
            <option value="web">web</option>
            <option value="app">app</option>
            <option value="game">game</option>
            <option value="material">material</option>
          </select>
          <select name="platform">
            <option value="">Platform (optional)</option>
            <option value="mobile">mobile</option>
            <option value="console">console</option>
            <option value="desktop">desktop</option>
            <option value="browser">browser</option>
          </select>
          <input name="author" placeholder="Author (optional)" />
          <input name="url" placeholder="URL (optional)" />
          <input name="trailerUrl" placeholder="Trailer video URL (optional)" />
          <textarea name="description" placeholder="Description (optional)" rows="2"></textarea>
          <div class="form-row">
            <button type="submit" class="btn btn-primary">Create</button>
            <button type="button" class="btn" id="cancel-new-group">Cancel</button>
          </div>
        </form>
      </aside>

      <main class="main" id="main">
        <div class="empty-panel">Select a group, or create a new one, to start adding images.</div>
      </main>
    </div>

    <dialog id="lightbox" class="lightbox">
      <div class="lightbox-inner">
        <button type="button" class="lightbox-close" aria-label="Close" data-lightbox-close>×</button>
        <button type="button" class="lightbox-nav lightbox-prev" aria-label="Previous image" data-lightbox-prev>‹</button>
        <button type="button" class="lightbox-nav lightbox-next" aria-label="Next image" data-lightbox-next>›</button>
        <img id="lightbox-img" alt="" />
        <p id="lightbox-caption" class="lightbox-caption" hidden></p>
      </div>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
